<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>BEAROT</title><style>@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Crimson+Text:wght@400;700&display=swap');body{margin:0;overflow:hidden;background:#08050b;color:#f5e7c7;font-family:'Crimson Text',serif}#bg{position:fixed;inset:0}#wrap{position:relative;z-index:2;min-height:100vh;display:grid;place-items:center;padding:24px}.panel{width:min(1200px,100%);text-align:center;background:rgba(10,6,14,.45);backdrop-filter:blur(14px);border:1px solid rgba(216,179,95,.25);border-radius:28px;padding:32px;box-shadow:0 0 60px rgba(0,0,0,.5)}h1{font-family:Cinzel,serif;font-size:min(10vw,6rem);margin:0;color:#d8b35f;text-shadow:0 0 25px rgba(216,179,95,.5)}.sub{color:#cdb37e;margin:8px auto 24px}.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}.card{cursor:pointer;padding:20px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid rgba(216,179,95,.25);transition:.2s}.card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 0 25px rgba(216,179,95,.25)}#panel{margin-top:22px;min-height:180px;padding:24px;border-radius:20px;background:radial-gradient(circle at top,rgba(216,179,95,.08),transparent),rgba(0,0,0,.3);text-align:left}h2{font-family:Cinzel,serif;color:#d8b35f}.result{font-size:1.35rem}</style></head><body><canvas id='bg'></canvas><div id='wrap'><div class='panel'><h1>BEAROT</h1><div class='sub'>Occult Arcade • Tarot • Crystal Ball • Spirit Board • Paw Reading</div><div class='menu'><div class='card' onclick='tarot()'>🃏 Tarot</div><div class='card' onclick='crystal()'>🔮 Crystal Ball</div><div class='card' onclick='eight()'>🎱 Magic 8</div><div class='card' onclick='board()'>🕯 Spirit Board</div><div class='card' onclick='paw()'>🐾 Paw Reading</div><div class='card' onclick='library()'>📚 Library</div></div><div id='panel'><h2>Welcome</h2><div class='result'>Choose a module above.</div></div></div></div><script>const panel=document.getElementById('panel');const cards=['Ace of Hearts','Queen of Spades','10 of Diamonds','Black Joker','King of Clubs'];const ball=['The mist approves.','Wait.','A hidden ally helps.','The path opens soon.'];const eights=['YES','NO','MAYBE','ASK LATER','BAD ODDS'];function tarot(){panel.innerHTML='<h2>Tarot Draw</h2><div class=result>'+cards[Math.floor(Math.random()*cards.length)]+'</div>'}function crystal(){panel.innerHTML='<h2>Crystal Ball</h2><div class=result>'+ball[Math.floor(Math.random()*ball.length)]+'</div>'}function eight(){panel.innerHTML='<h2>Magic 8</h2><div class=result>'+eights[Math.floor(Math.random()*eights.length)]+'</div>'}function board(){panel.innerHTML='<h2>Spirit Board</h2><div class=result>BEAR</div>'}function paw(){panel.innerHTML='<h2>Paw Reading</h2><div class=result>Moon Paw: intuition is louder than logic today.</div>'}function library(){panel.innerHTML='<h2>Library</h2><div class=result>Hearts=Cups • Diamonds=Pentacles • Clubs=Wands • Spades=Swords</div>'}const c=bg,x=c.getContext('2d');function rs(){c.width=innerWidth;c.height=innerHeight}rs();onresize=rs;let p=[...Array(250)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:Math.random()*2+1,v:Math.random()+.2}));(function a(){x.fillStyle='rgba(8,5,11,.25)';x.fillRect(0,0,c.width,c.height);for(const d of p){d.y+=d.v;if(d.y>c.height){d.y=0;d.x=Math.random()*c.width}x.fillStyle='rgba(216,179,95,.55)';x.fillRect(d.x,d.y,d.s,d.s)}requestAnimationFrame(a)})();</script></body></html>
