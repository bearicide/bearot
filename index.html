<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BEAROT Carnival Oracle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cinzel+Decorative:wght@700&family=Crimson+Text:wght@400;600;700&display=swap');
:root{--bg:#07040a;--panel:rgba(12,7,15,.72);--panel2:rgba(44,17,34,.62);--gold:#d8b35f;--gold2:#ffe6a3;--ink:#f7e7c4;--muted:#d6bd83;--red:#9f1d1d;--violet:#6c36b5;--blue:#91c9ff;--line:rgba(216,179,95,.35);--title:'Cinzel Decorative','Cinzel',serif;--head:'Cinzel',serif;--body:'Crimson Text',serif}
[data-theme='midnight']{--gold:#b9caff;--gold2:#dfe7ff;--red:#4e48ff;--violet:#243a86;--blue:#9bd8ff}
[data-theme='neon']{--gold:#ffdc5e;--gold2:#fff2a3;--red:#ff3fd5;--violet:#7d2cff;--blue:#38fff3}
[data-theme='mattbear']{--gold:#ffcf62;--gold2:#fff0af;--red:#d84a22;--violet:#7d2cff;--blue:#6ee7ff}
*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:var(--body);background:radial-gradient(circle at 15% 0%,color-mix(in srgb,var(--red),transparent 72%),transparent 28rem),radial-gradient(circle at 85% 5%,color-mix(in srgb,var(--violet),transparent 68%),transparent 30rem),radial-gradient(circle at 50% 120%,color-mix(in srgb,var(--gold),transparent 82%),transparent 25rem),var(--bg);overflow-x:hidden}body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-radial-gradient(circle at 30% 20%,rgba(255,255,255,.035) 0 1px,transparent 1px 8px),linear-gradient(90deg,rgba(255,210,100,.08),transparent 22%,transparent 78%,rgba(255,210,100,.08));animation:fog 18s linear infinite}@keyframes fog{to{transform:translate(-28px,18px)}}canvas{position:fixed;inset:0;z-index:1}.app{position:relative;z-index:2;min-height:100vh;padding:24px;display:grid;place-items:center}.shell{width:min(1260px,100%);border:1px solid var(--line);border-radius:34px;padding:clamp(18px,3vw,34px);background:radial-gradient(circle at top,rgba(255,255,255,.08),transparent 16rem),linear-gradient(145deg,var(--panel),var(--panel2));box-shadow:0 0 90px #000,inset 0 0 0 1px rgba(255,255,255,.08);backdrop-filter:blur(12px)}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:18px}.brand{display:flex;align-items:center;gap:16px}.logo{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;border:2px solid var(--gold);color:var(--gold2);font:700 34px var(--head);box-shadow:0 0 26px color-mix(in srgb,var(--gold),transparent 55%)}h1{font-family:var(--title);font-size:clamp(3rem,8vw,7rem);line-height:.9;margin:0;color:var(--gold);text-shadow:0 2px 0 #000,0 0 32px color-mix(in srgb,var(--gold),transparent 55%)}.sub{color:var(--muted);font-size:1.08rem}.controls{display:flex;gap:10px;flex-wrap:wrap}button,select{cursor:pointer;border:1px solid var(--line);border-radius:16px;padding:12px 14px;color:var(--ink);background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.035));font:700 .94rem var(--head);letter-spacing:.04em;box-shadow:0 10px 22px rgba(0,0,0,.28)}button:hover{transform:translateY(-2px);box-shadow:0 0 22px color-mix(in srgb,var(--gold),transparent 62%)}select{background:#160d19;color:var(--ink)}.hero{display:grid;grid-template-columns:minmax(260px,390px) 1fr;gap:24px;align-items:stretch}.oracle{position:relative;min-height:520px;border-radius:28px;border:1px solid var(--line);background:radial-gradient(circle at center,rgba(145,201,255,.13),transparent 18rem),rgba(0,0,0,.24);overflow:hidden;display:grid;place-items:center;padding:24px}.ring{position:absolute;width:330px;height:330px;border-radius:50%;border:1px solid rgba(216,179,95,.38);animation:spin 28s linear infinite}.ring::before,.ring::after{content:'✦ ☾ ✧ ★ ✦';position:absolute;inset:-16px;text-align:center;color:var(--gold);font:700 24px var(--head);letter-spacing:18px}@keyframes spin{to{transform:rotate(360deg)}}.orb{width:230px;height:230px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#fff,#91c9ff 15%,#6c36b5 45%,#16051d 75%);box-shadow:0 0 65px color-mix(in srgb,var(--blue),transparent 38%),0 0 120px color-mix(in srgb,var(--violet),transparent 55%),inset 0 0 38px rgba(255,255,255,.35);animation:pulse 5s ease-in-out infinite}@keyframes pulse{50%{transform:scale(1.05);filter:brightness(1.15)}}.cardback{position:absolute;bottom:22px;width:138px;aspect-ratio:5/7;border-radius:14px;border:1px solid var(--gold);background:linear-gradient(145deg,#101a4a,#090612);box-shadow:0 18px 26px rgba(0,0,0,.45);transform:rotate(-8deg)}.cardback::after{content:'BEAROT';position:absolute;inset:12px;border:3px double var(--gold);border-radius:10px;display:grid;place-items:center;color:var(--gold2);font:700 14px var(--head);letter-spacing:.14em}.cardback.two{right:58px;transform:rotate(9deg);background:linear-gradient(145deg,#3b1020,#12060d)}.cardback.one{left:58px}.dashboard{display:grid;grid-template-rows:auto 1fr;gap:16px}.grid{display:grid;grid-template-columns:repeat(3,minmax(150px,1fr));gap:14px}.tile{min-height:132px;text-align:left;padding:18px;border-radius:22px;position:relative;overflow:hidden}.tile strong{display:block;font-size:1.15rem;margin-bottom:8px}.tile span{color:var(--muted);font-family:var(--body);font-weight:600;letter-spacing:0}.tile::after{content:'';position:absolute;inset:auto -20px -40px auto;width:120px;height:120px;border-radius:50%;background:color-mix(in srgb,var(--gold),transparent 88%)}.panel{border-radius:24px;min-height:250px;padding:22px;border:1px solid rgba(216,179,95,.22);background:rgba(0,0,0,.28)}h2{font-family:var(--head);color:var(--gold);margin:0 0 8px}.result{font-size:1.32rem;line-height:1.45}.meta{color:var(--muted);margin-top:12px}.journal{margin-top:14px;display:grid;gap:10px;max-height:180px;overflow:auto}.note{border:1px solid rgba(216,179,95,.18);border-radius:14px;padding:10px 12px;background:rgba(255,255,255,.045)}.board{margin-top:14px;display:grid;grid-template-columns:repeat(10,1fr);gap:5px}.board span{border:1px solid rgba(216,179,95,.2);border-radius:8px;text-align:center;padding:7px 4px;background:rgba(255,255,255,.045)}.board .hot{background:var(--red);color:#fff}footer{text-align:center;color:var(--muted);margin-top:20px}@media(max-width:900px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.oracle{min-height:420px}}@media(max-width:560px){.app{padding:12px}.shell{border-radius:22px}.brand{display:block;text-align:center;width:100%}.logo{margin:0 auto 12px}.controls{width:100%}button,select{width:100%}.grid{grid-template-columns:1fr}.cardback{display:none}.board{grid-template-columns:repeat(5,1fr)}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body data-theme="carnival">
<canvas id="bg"></canvas>
<main class="app"><section class="shell"><header class="topbar"><div class="brand"><div class="logo">✦</div><div><h1>BEAROT</h1><div class="sub">Carnival Oracle • Tarot • Crystal Ball • Spirit Board • Paw Reading</div></div></div><div class="controls"><select id="theme" aria-label="Theme"><option value="carnival">Carnival Oracle</option><option value="midnight">Midnight Carnival</option><option value="neon">Neon Ritual</option><option value="mattbear">MATTBEAR Oracle</option></select><button id="save">Save</button><button id="clear">Clear Journal</button></div></header><section class="hero"><aside class="oracle"><div class="ring"></div><div class="orb" aria-hidden="true"></div><div class="cardback one"></div><div class="cardback two"></div></aside><section class="dashboard"><div class="grid"><button class="tile" data-oracle="tarot"><strong>🃏 Tarot Draw</strong><span>Pull from the Carnival Oracle deck.</span></button><button class="tile" data-oracle="crystal"><strong>🔮 Crystal Ball</strong><span>Symbolic answers from the mist.</span></button><button class="tile" data-oracle="eight"><strong>🎱 Magic 8</strong><span>Fast yes/no chaos.</span></button><button class="tile" data-oracle="spirit"><strong>🕯 Spirit Board</strong><span>Animated word reveal.</span></button><button class="tile" data-oracle="paw"><strong>🐾 Paw Reading</strong><span>Palm reading, bearified.</span></button><button class="tile" data-oracle="library"><strong>📚 Library</strong><span>Meanings, FAQ, and instructions.</span></button></div><section class="panel" id="panel"><h2>Welcome</h2><div class="result">Choose an oracle. The carnival lights are on.</div><div class="meta">High-quality BEAROT index recreated as one safe file.</div></section><section class="journal" id="journal"></section></section></section><footer>BEAROT • MATTBEAR Carnival Oracle • GitHub Pages-ready</footer></section></main>
<script>
const $=q=>document.querySelector(q),bg=$('#bg'),ctx=bg.getContext('2d'),panel=$('#panel'),journalBox=$('#journal');let particles=[],last=null;const data={crystal:['The mist opens around a choice you have been pretending is smaller than it is.','A hidden opportunity is near, but it will not announce itself politely.','Wait for the second sign. The first one is only the knock.','A bargain hides a cost. Read the fine print, even if it wears glitter.','The door opens after one honest action.','The answer improves when you stop forcing it.','The lantern is already lit. Stop asking the dark for permission.','The carnival lights point left.'],eight:['YES','NO','MAYBE','ASK LATER','WEIRDLY YES','BAD ODDS','THE OMENS SHRUG','PROBABLY','ABSOLUTELY NOT','A TINY YES'],spirit:['MOON','KEY','HONEY','WAIT','OPEN','LEFT','SOON','LISTEN','BEAR','DOOR','WHEEL','SPARK'],paw:[['Moon Paw','Your instincts are louder than the room. Write the dream down before the day eats it.'],['Claw Paw','You are in defense/build mode. Cut cleanly, not wildly.'],['Heart Paw','Loyalty is sacred, but it still needs a fence.'],['Coin Paw','Sort the resources before the ritual. Money magic starts with knowing what is in the drawer.']],cards:[['Ace of Hearts','Ace of Cups','A fresh emotional doorway opens. Let tenderness arrive without making it perform tricks.'],['Queen of Spades','Queen of Swords','Clarity protects you. Say the clean sentence and let it stand.'],['King of Diamonds','King of Pentacles','Build the system that makes success repeatable.'],['Jack of Clubs','Page/Knight of Wands','A restless spark wants action. Aim it before it becomes noise.']]};function pick(a){return a[Math.floor(Math.random()*a.length)]}function bind(){document.querySelectorAll('[data-oracle]').forEach(b=>b.onclick=()=>run(b.dataset.oracle));$('#theme').onchange=e=>document.body.dataset.theme=e.target.value;$('#save').onclick=save;$('#clear').onclick=clearJ}function run(t){if(t==='tarot'){let c=pick(data.cards);last={title:c[0],text:c[1]+': '+c[2],time:new Date().toLocaleString()};render('🃏 '+c[0],last.text,'Card drawn from the Carnival Oracle deck.')}if(t==='crystal'){let m=pick(data.crystal);last={title:'Crystal Ball',text:m,time:new Date().toLocaleString()};render('🔮 Crystal Ball',m,'The mist has spoken.');glow()}if(t==='eight'){let m=pick(data.eight);last={title:'Magic 8',text:m,time:new Date().toLocaleString()};render('🎱 Magic 8',m,'Direct, questionable, efficient.')}if(t==='spirit'){let w=pick(data.spirit);last={title:'Spirit Board',text:w,time:new Date().toLocaleString()};board(w)}if(t==='paw'){let p=pick(data.paw);last={title:p[0],text:p[1],time:new Date().toLocaleString()};render('🐾 '+p[0],p[1],'Pawprint archetype reading.')}if(t==='library'){last=null;render('📚 Library','Hearts map to Cups. Diamonds map to Pentacles. Clubs map to Wands. Spades map to Swords. Jokers carry Fool / Trickster energy.','Library foundation.')}}function render(t,m,meta){panel.innerHTML='<h2>'+t+'</h2><div class="result">'+m+'</div><div class="meta">'+meta+'</div>'}function board(word){let letters='ABCDEFGHIJKLMNOPQRSTUVWXYZYESNO'.split('');panel.innerHTML='<h2>🕯 Spirit Board</h2><div class="result" id="word"></div><div class="board">'+letters.map(l=>'<span>'+l+'</span>').join('')+'</div><div class="meta">The board spells slowly. Entertainment only; no demons on payroll.</div>';let i=0,timer=setInterval(()=>{document.querySelectorAll('.board span').forEach(s=>s.classList.remove('hot'));if(i>=word.length){clearInterval(timer);return}let ch=word[i++];$('#word').textContent+=ch;document.querySelectorAll('.board span').forEach(s=>{if(s.textContent===ch)s.classList.add('hot')})},280)}function save(){if(!last){render('Nothing to save','Choose an oracle first, then save the result.','Journal stays in this browser.');return}let j=JSON.parse(localStorage.getItem('bearotJournal')||'[]');j.unshift(last);localStorage.setItem('bearotJournal',JSON.stringify(j.slice(0,50)));loadJ()}function loadJ(){let j=JSON.parse(localStorage.getItem('bearotJournal')||'[]');journalBox.innerHTML=j.length?j.slice(0,6).map(x=>'<div class="note"><b>'+x.title+'</b><br>'+x.text+'<br><small>'+x.time+'</small></div>').join(''):'<div class="note">No saved readings yet.</div>'}function clearJ(){localStorage.removeItem('bearotJournal');loadJ()}function resize(){bg.width=innerWidth;bg.height=innerHeight}function makeParticles(){particles=Array.from({length:360},()=>({x:Math.random()*bg.width,y:Math.random()*bg.height,v:Math.random()*0.7+0.12,s:Math.random()*2+0.5,a:Math.random()*0.6+0.1}))}function animate(){ctx.fillStyle='rgba(7,4,10,.22)';ctx.fillRect(0,0,bg.width,bg.height);for(const p of particles){p.y+=p.v;p.x+=Math.sin(p.y*0.008)*0.12;if(p.y>bg.height){p.y=-5;p.x=Math.random()*bg.width}ctx.fillStyle='rgba(216,179,95,'+p.a+')';ctx.fillRect(p.x,p.y,p.s,p.s)}requestAnimationFrame(animate)}function glow(){document.querySelector('.orb').animate([{filter:'brightness(1)'},{filter:'brightness(1.55) saturate(1.4)'},{filter:'brightness(1)'}],{duration:900,easing:'ease-out'})}window.onresize=()=>{resize();makeParticles()};resize();makeParticles();animate();bind();loadJ();
</script>
</body>
</html>
