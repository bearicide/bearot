<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>BEAROT</title><style>body{margin:0;overflow:hidden;background:radial-gradient(circle at center,#2b1538,#0b060d 70%);color:#f5e7c7;font-family:Georgia,serif}canvas{position:fixed;inset:0}#app{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}h1{font-size:min(12vw,6rem);margin:0;color:#d8b35f}.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;width:min(1000px,100%)}.card{cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(216,179,95,.3);padding:18px;border-radius:16px}.card:hover{background:rgba(216,179,95,.15)}#panel{margin-top:20px;width:min(900px,100%);background:rgba(0,0,0,.35);padding:20px;border-radius:16px;min-height:120px}.btn{padding:10px 16px;margin:8px;background:#5b1e1e;color:#f5e7c7;border:0;border-radius:8px}.result{font-size:1.2rem}</style></head><body><canvas id='bg'></canvas><div id='app'><h1>BEAROT</h1><p>Occult Arcade</p><div class='menu'><div class='card' onclick='tarot()'>🃏 Tarot</div><div class='card' onclick='crystal()'>🔮 Crystal Ball</div><div class='card' onclick='eight()'>🎱 Magic 8</div><div class='card' onclick='board()'>🕯 Spirit Board</div><div class='card' onclick='paw()'>🐾 Paw Reading</div><div class='card' onclick='library()'>📚 Library</div></div><div id='panel'><div class='result'>Choose an oracle.</div></div></div><script>const panel=document.getElementById('panel');const cards=['Ace of Hearts','Queen of Spades','10 of Diamonds','Black Joker','King of Clubs'];const ballAns=['The mist says yes.','Not yet.','A hidden ally helps.','The answer improves tomorrow.'];const eightAns=['YES','NO','MAYBE','ASK LATER','BAD ODDS'];const pawAns=['Heart Paw: loyalty.','Claw Paw: defense.','Moon Paw: intuition.','Coin Paw: resources.'];function tarot(){let c=cards[Math.floor(Math.random()*cards.length)];panel.innerHTML='<h2>Tarot Draw</h2><div class=result>'+c+'</div>'}function crystal(){panel.innerHTML='<h2>Crystal Ball</h2><div class=result>'+ballAns[Math.floor(Math.random()*ballAns.length)]+'</div>'}function eight(){panel.innerHTML='<h2>Magic 8</h2><div class=result>'+eightAns[Math.floor(Math.random()*eightAns.length)]+'</div>'}function board(){panel.innerHTML='<h2>Spirit Board</h2><div class=result>BEAR</div>'}function paw(){panel.innerHTML='<h2>Paw Reading</h2><div class=result>'+pawAns[Math.floor(Math.random()*pawAns.length)]+'</div>'}function library(){panel.innerHTML='<h2>Library</h2><p>Hearts=Cups. Diamonds=Pentacles. Clubs=Wands. Spades=Swords.</p>'}const c=document.getElementById('bg'),x=c.getContext('2d');function r(){c.width=innerWidth;c.height=innerHeight}r();onresize=r;let p=[...Array(150)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,v:Math.random()+.2}));(function a(){x.clearRect(0,0,c.width,c.height);for(const s of p){s.y+=s.v;if(s.y>c.height)s.y=0;x.fillStyle='rgba(216,179,95,.4)';x.fillRect(s.x,s.y,2,2)}requestAnimationFrame(a)})();</script></body></html>
