<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>BEAROT</title><style>body{margin:0;overflow:hidden;background:radial-gradient(circle at center,#2b1538,#0b060d 70%);color:#f5e7c7;font-family:Georgia,serif}#bg{position:fixed;inset:0}.ui{position:relative;z-index:2;display:flex;min-height:100vh;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem}h1{font-size:min(12vw,6rem);margin:0;color:#d8b35f;text-shadow:0 0 30px rgba(216,179,95,.5)}p{max-width:800px;font-size:1.2rem}.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;width:min(1000px,100%);margin-top:2rem}.card{background:rgba(255,255,255,.06);border:1px solid rgba(216,179,95,.3);padding:1rem;border-radius:16px;backdrop-filter:blur(8px)}.sigil{font-size:4rem;animation:pulse 4s infinite}@keyframes pulse{50%{transform:scale(1.1)}}a{color:#d8b35f}</style></head><body><canvas id='bg'></canvas><div class='ui'><div class='sigil'>✦</div><h1>BEAROT</h1><p>Occult Arcade • Tarot • Cartomancy • Crystal Ball • Magic 8 • Spirit Board • Paw Reading</p><div class='menu'><div class='card'>🃏 Cards</div><div class='card'>🔮 Crystal Ball</div><div class='card'>🎱 Magic 8</div><div class='card'>🕯 Spirit Board</div><div class='card'>🐾 Paw Reading</div><div class='card'>📚 Library</div></div></div><script>const c=document.getElementById('bg'),x=c.getContext('2d');function r(){c.width=innerWidth;c.height=innerHeight}r();onresize=r;let p=[...Array(120)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,v:(Math.random()*1)+.2}));(function a(){x.clearRect(0,0,c.width,c.height);for(const s of p){s.y+=s.v;if(s.y>c.height)s.y=0;x.fillStyle='rgba(216,179,95,.4)';x.fillRect(s.x,s.y,2,2)}requestAnimationFrame(a)})();</script></body></html>
