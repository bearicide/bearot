<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>BEAROT</title><style>@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Crimson+Text:wght@400;700&display=swap');body{margin:0;overflow:hidden;background:#07040a;color:#f5e7c7;font-family:Crimson Text,serif}canvas{position:fixed;inset:0}#w{position:relative;z-index:2;min-height:100vh;display:grid;place-items:center;padding:20px}.panel{width:min(1300px,100%);padding:30px;border-radius:32px;background:rgba(8,5,11,.55);backdrop-filter:blur(14px);border:1px solid rgba(216,179,95,.25);box-shadow:0 0 80px rgba(0,0,0,.6)}h1{text-align:center;font:900 min(10vw,6rem) Cinzel,serif;color:#d8b35f;margin:0}.sub{text-align:center;color:#d0b07a}.orb{width:180px;height:180px;margin:15px auto;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#8ac 15%,#6530a0 45%,#12051d 75%);box-shadow:0 0 60px #8ac8,0 0 120px #8030ff44;animation:pulse 6s infinite}@keyframes pulse{50%{transform:scale(1.06)}}.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}.card{padding:20px;border-radius:18px;cursor:pointer;text-align:center;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border:1px solid rgba(216,179,95,.25)}.card:hover{transform:translateY(-4px);box-shadow:0 0 25px rgba(216,179,95,.25)}#panel{margin-top:18px;padding:20px;min-height:180px;border-radius:20px;background:rgba(0,0,0,.35)}h2{font-family:Cinzel,serif;color:#d8b35f}</style></head><body><canvas id='bg'></canvas><div id='w'><div class='panel'><h1>BEAROT</h1><div class='sub'>Occult Arcade • Tarot • Crystal Ball • Spirit Board • Paw Reading</div><div class='orb'></div><div class='menu'><div class='card' onclick='s(`🃏 Tarot`,`Ace of Hearts — A new emotional path appears.`)'>🃏 Tarot</div><div class='card' onclick='s(`🔮 Crystal Ball`,`The mist reveals a hidden opportunity.`)'>🔮 Crystal Ball</div><div class='card' onclick='s(`🎱 Magic 8`,`ASK LATER`)'>🎱 Magic 8</div><div class='card' onclick='s(`🕯 Spirit Board`,`B E A R`)'>🕯 Spirit Board</div><div class='card' onclick='s(`🐾 Paw Reading`,`Moon Paw — intuition exceeds logic today.`)'>🐾 Paw Reading</div><div class='card' onclick='s(`📚 Library`,`Hearts=Cups • Diamonds=Pentacles • Clubs=Wands • Spades=Swords`)'>📚 Library</div></div><div id='panel'><h2>Welcome</h2><p>Choose a module above.</p></div></div></div><script>function s(t,m){panel.innerHTML='<h2>'+t+'</h2><p style=font-size:1.3rem>'+m+'</p>'}const c=bg,x=c.getContext('2d');function r(){c.width=innerWidth;c.height=innerHeight}r();onresize=r;let p=[...Array(350)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,v:Math.random()*1.2+.2,s:Math.random()*2+1}));(function a(){x.fillStyle='rgba(7,4,10,.18)';x.fillRect(0,0,c.width,c.height);for(const d of p){d.y+=d.v;if(d.y>c.height){d.y=0;d.x=Math.random()*c.width}x.fillStyle='rgba(216,179,95,.5)';x.fillRect(d.x,d.y,d.s,d.s)}x.strokeStyle='rgba(120,80,200,.08)';for(let i=0;i<20;i++){x.beginPath();x.arc(c.width/2,c.height/2,120+i*18,0,6.28);x.stroke()}requestAnimationFrame(a)})();</script></body></html>
